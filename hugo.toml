baseURL = "https://hantaikeju.github.io/"
languageCode = "zh-cn"
title = "hantaikeju 的技术博客"
theme = "PaperMod"

# 博客基础设置
[params]
  author = "hantaikeju"
  description = "记录"
  defaultTheme = "auto"    # 自动浅色/深色模式
  showToc = true           # 显示文章目录
  showReadingTime = true   # 显示阅读时间
  showPostNavLinks = true  # 上一篇 / 下一篇
  enableGitInfo = true

# 顶部导航菜单
[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 2

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3

# Markdown 渲染支持
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true