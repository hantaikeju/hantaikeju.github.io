baseURL = "https://hantaikeju.github.io/"
languageCode = "zh-cn"
title = "hantaikeju 的技术博客"
theme = "PaperMod"

[params]
  author = "hantaikeju"
  description = "记录"
  defaultTheme = "auto"
  showToc = true
  showReadingTime = true
  showPostNavLinks = true
  enableGitInfo = true
  mainSections = ["posts"]

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 2
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true