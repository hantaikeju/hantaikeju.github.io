        summary: "Rust 简介 The Rust Programming Language 是一门系统级编程语言，官方提供了完善的在线文档：Rust Book。\nRust 版本 Edition：大版本，如 2021、2024 Version：小版本编号，如 1.56.0 → 1.81.0 Rust 优势 优势 说明 高性能 零成本抽象，媲美 C/C++ 的运行速度 内存安全 所有权系统在编译期消除悬垂指针、数据竞争 开发者友好 清晰的错误提示 + rustfmt / clippy 等工具 健壮的生态 Cargo 包管理器，crates.io 丰富的社区库 Rust 可编写更快、更可靠的软件，兼具高层次的易用性和低层次的控制力。\nRust 简史 时间 事件 2006 个人项目起源 2009 Mozilla 赞助 2015 第一个稳定版 1.0 2021 Rust 基金会成立，Rust Edition 2021 发布 2022 用于 Linux 内核开发 Windows 下 Rust 安装 Windows 下 Rust 有两套编译工具链：\n工具链 说明 x86_64-pc-windows-msvc 微软 MSVC ABI（官方默认） x86_64-pc-windows-gnu MinGW-w64 + GCC ABI 两种工具链的区别 1. 工具链 MSVC：必须提前安装 Visual Studio Build Tools 并勾选 C++ 开发组件，提供微软原生 link.exe 链接器、UCRT 运行库。 GNU：依赖 MinGW-w64 环境，无需安装 VS，使用 GNU ld/lld 链接器、MinGW 自有 C 运行库。 2. ABI（程序与 C 库之间的二进制接口） MSVC：微软标准 ABI，仅能链接 VS 编译的 .lib 库； GNU：GCC 标准 ABI，仅能链接 MinGW 编译的 .a 库。 ⚠️ 二者二进制库不互通，不可混用。 3. 运行依赖与打包 MSVC：依赖 Windows 系统自带 UCRT，编译出的 .exe 可直接在 Windows 服务器运行，无需附带额外动态库。 GNU：依赖 libgcc_s_seh-1.dll 等 GNU 运行库，不静态链接时分发程序必须配套打包对应 .dll，否则无法启动。 4. 系统适配能力 MSVC：原生兼容 Windows API、COM、Windows 服务、IOCP、系统 dump 调试。云 Windows 服务器、桌面程序、对接商业 SDK 优先选择。 GNU：对 Windows 底层特性适配一般，适合纯跨平台命令行工具，重度依赖开源 FFmpeg 等 MinGW 预编译 C 库场景。 5. 调试体系 MSVC：生成 PDB 符号文件，完美支持 VS、WinDbg 线上崩溃堆栈排查。 GNU：生成 DWARF 调试信息，仅适配 GDB，Windows 原生调试工具解析效果差。 6. 异常机制 MSVC：Windows 原生 SEH 结构化异常。 GNU：GCC DWARF/SJLJ 异常，跨 FFI 边界抛异常易崩溃。 选型总结 场景 推荐工具链 本地 Windows 日常开发 msvc（默认） 本地 Windows 开发 + Windows 云服务器部署 msvc 部署 Linux 云服务器 额外安装 x86_64-unknown-linux-gnu / x86_64-unknown-linux-musl 目标交叉编译 仅在同时满足以下全部条件时用 windows-gnu：\n",
